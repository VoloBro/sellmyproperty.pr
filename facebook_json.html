<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PR Deal Radar — Facebook Marketplace</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e17;
    --surface: #111827;
    --surface2: #1a2236;
    --border: #1e2d45;
    --text: #e2e8f0;
    --text-dim: #64748b;
    --accent: #22d3ee;
    --accent-glow: rgba(34, 211, 238, 0.15);
    --green: #34d399;
    --yellow: #fbbf24;
    --orange: #fb923c;
    --red: #f87171;
    --pink: #f472b6;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    overflow: hidden;
  }

  /* ── Sidebar ── */
  .sidebar {
    width: 380px;
    min-width: 380px;
    height: 100vh;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    z-index: 1000;
  }

  .sidebar-header {
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--border);
  }

  .logo {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.5px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-icon {
    width: 32px;
    height: 32px;
    background: linear-gradient(135deg, var(--accent), #6366f1);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
  }

  .stats-bar {
    display: flex;
    gap: 16px;
    margin-top: 12px;
    font-size: 13px;
  }

  .stat {
    display: flex;
    align-items: center;
    gap: 6px;
    color: var(--text-dim);
  }

  .stat-value {
    color: var(--accent);
    font-family: 'JetBrains Mono', monospace;
    font-weight: 600;
  }

  /* ── Filters ── */
  .filters {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .filter-row {
    display: flex;
    gap: 10px;
  }

  .filter-group {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .filter-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-dim);
    font-weight: 500;
  }

  input, select {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 12px;
    border-radius: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }

  input:focus, select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px var(--accent-glow);
  }

  input::placeholder { color: var(--text-dim); }

  .search-input {
    width: 100%;
    position: relative;
  }

  .search-input input {
    width: 100%;
    padding-left: 36px;
  }

  .search-input::before {
    content: '⌕';
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-dim);
    font-size: 16px;
    pointer-events: none;
  }

  .btn-load {
    background: linear-gradient(135deg, var(--accent), #6366f1);
    color: #000;
    border: none;
    padding: 10px 16px;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 700;
    font-size: 13px;
    cursor: pointer;
    letter-spacing: 0.3px;
    transition: opacity 0.2s, transform 0.1s;
  }

  .btn-load:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-load:active { transform: translateY(0); }

  .status-pills {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .pill {
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text-dim);
    transition: all 0.2s;
    user-select: none;
  }

  .pill.active {
    background: var(--accent-glow);
    border-color: var(--accent);
    color: var(--accent);
  }

  .pill:hover { border-color: var(--accent); }

  /* ── Listing Cards ── */
  .listings {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
  }

  .listings::-webkit-scrollbar { width: 6px; }
  .listings::-webkit-scrollbar-track { background: transparent; }
  .listings::-webkit-scrollbar-thumb {
    background: var(--border);
    border-radius: 3px;
  }

  .listing-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
  }

  .listing-card:hover {
    border-color: var(--accent);
    background: rgba(34, 211, 238, 0.04);
    transform: translateX(3px);
  }

  .listing-card.highlighted {
    border-color: var(--accent);
    box-shadow: 0 0 16px var(--accent-glow);
  }

  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 6px;
  }

  .card-price {
    font-family: 'JetBrains Mono', monospace;
    font-size: 18px;
    font-weight: 700;
  }

  .card-status {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .status-live { background: rgba(52, 211, 153, 0.15); color: var(--green); }
  .status-pending { background: rgba(251, 191, 36, 0.15); color: var(--yellow); }
  .status-sold { background: rgba(248, 113, 113, 0.15); color: var(--red); }

  .card-title {
    font-size: 13px;
    font-weight: 500;
    line-height: 1.4;
    margin-bottom: 6px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .card-meta {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 12px;
    color: var(--text-dim);
  }

  .card-city {
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .card-link {
    margin-left: auto;
    color: var(--accent);
    text-decoration: none;
    font-size: 11px;
    font-weight: 600;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .listing-card:hover .card-link { opacity: 1; }

  /* ── Price colors ── */
  .price-low { color: var(--green); }
  .price-mid { color: var(--yellow); }
  .price-high { color: var(--orange); }
  .price-premium { color: var(--pink); }

  /* ── Map ── */
  .map-container {
    flex: 1;
    position: relative;
  }

  #map { width: 100%; height: 100%; }

  /* Leaflet popup override */
  .leaflet-popup-content-wrapper {
    background: var(--surface) !important;
    color: var(--text) !important;
    border-radius: 10px !important;
    border: 1px solid var(--border) !important;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5) !important;
  }

  .leaflet-popup-tip { background: var(--surface) !important; }

  .leaflet-popup-content {
    font-family: 'DM Sans', sans-serif !important;
    font-size: 13px !important;
    line-height: 1.5 !important;
    margin: 12px 16px !important;
  }

  .popup-price {
    font-family: 'JetBrains Mono', monospace;
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 4px;
  }

  .popup-title {
    font-size: 14px;
    font-weight: 500;
    margin-bottom: 8px;
  }

  .popup-city {
    color: var(--text-dim);
    font-size: 12px;
    margin-bottom: 8px;
  }

  .popup-link {
    display: inline-block;
    color: var(--accent);
    text-decoration: none;
    font-weight: 600;
    font-size: 12px;
  }

  .popup-link:hover { text-decoration: underline; }

  /* ── Empty / Drop State ── */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--text-dim);
    text-align: center;
    padding: 32px;
  }

  .empty-icon {
    font-size: 48px;
    margin-bottom: 16px;
    opacity: 0.4;
  }

  .empty-title {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 8px;
    color: var(--text);
  }

  .empty-sub { font-size: 13px; line-height: 1.6; }

  .drop-zone {
    border: 2px dashed var(--border);
    border-radius: 12px;
    padding: 32px;
    margin: 16px;
    text-align: center;
    transition: all 0.3s;
    cursor: pointer;
  }

  .drop-zone.dragover {
    border-color: var(--accent);
    background: var(--accent-glow);
  }

  .drop-zone input[type="file"] { display: none; }

  .listing-count {
    padding: 8px 24px;
    font-size: 12px;
    color: var(--text-dim);
    border-bottom: 1px solid var(--border);
    font-family: 'JetBrains Mono', monospace;
  }

  @media (max-width: 768px) {
    body { flex-direction: column; }
    .sidebar { width: 100%; min-width: unset; height: 50vh; }
    .map-container { height: 50vh; }
  }
</style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-header">
    <div class="logo">
      <div class="logo-icon">📍</div>
      PR Deal Radar
    </div>
    <div class="stats-bar">
      <div class="stat">Listings: <span class="stat-value" id="totalCount">0</span></div>
      <div class="stat">Shown: <span class="stat-value" id="filteredCount">0</span></div>
      <div class="stat">Avg: <span class="stat-value" id="avgPrice">—</span></div>
    </div>
  </div>

  <div class="filters">
    <div class="search-input">
      <input type="text" id="searchInput" placeholder="Search titles, cities...">
    </div>
    <div class="filter-row">
      <div class="filter-group">
        <span class="filter-label">Min Price</span>
        <input type="number" id="minPrice" placeholder="$0" step="1000">
      </div>
      <div class="filter-group">
        <span class="filter-label">Max Price</span>
        <input type="number" id="maxPrice" placeholder="No limit" step="1000">
      </div>
    </div>
    <div class="filter-row">
      <div class="filter-group">
        <span class="filter-label">City</span>
        <select id="cityFilter"><option value="">All Cities</option></select>
      </div>
      <div class="filter-group" style="flex:0 0 auto;">
        <span class="filter-label">&nbsp;</span>
        <label class="btn-load" style="cursor:pointer;">
          Load JSON
          <input type="file" id="fileInput" accept=".json" style="display:none;">
        </label>
      </div>
    </div>
    <div>
      <span class="filter-label">Status</span>
      <div class="status-pills" style="margin-top:4px;">
        <span class="pill active" data-filter="live">Live</span>
        <span class="pill active" data-filter="pending">Pending</span>
        <span class="pill" data-filter="sold">Sold</span>
      </div>
    </div>
  </div>

  <div class="listing-count" id="listingCount">No data loaded</div>

  <div class="listings" id="listingsContainer">
    <div class="empty-state">
      <div class="empty-icon">📂</div>
      <div class="empty-title">Load your Apify export</div>
      <div class="empty-sub">
        Click "Load JSON" above or drag & drop your<br>
        <code style="color:var(--accent);">dataset_facebook-marketplace-scraper_*.json</code><br>
        file anywhere on this page.
      </div>
    </div>
  </div>
</div>

<div class="map-container">
  <div id="map"></div>
</div>

<script>
// ── Puerto Rico city coordinates ──
const CITY_COORDS = {
  'San Juan': [18.4655, -66.1057],
  'Bayamón': [18.3985, -66.1553],
  'Caguas': [18.2341, -66.0485],
  'Guaynabo': [18.3577, -66.1108],
  'Arecibo': [18.4725, -66.7157],
  'Toa Baja': [18.4443, -66.2541],
  'Vega Baja': [18.4441, -66.3878],
  'Cabo Rojo': [18.0866, -67.1457],
  'Ponce': [18.0111, -66.6141],
  'Corozal': [18.3418, -66.3168],
  'Vega Alta': [18.4123, -66.3312],
  'Mayagüez': [18.2013, -67.1397],
  'Utuado': [18.2655, -66.7007],
  'Orocovis': [18.2269, -66.3912],
  'Aibonito': [18.1399, -66.2665],
  'Peñuelas': [18.0563, -66.7260],
  'San Germán': [18.0827, -67.0359],
  'Moca': [18.3947, -67.1131],
  'San Sebastián': [18.3374, -66.9901],
  'Arroyo': [17.9666, -66.0615],
  'Gurabo': [18.2544, -65.9727],
  'Guayanilla': [18.0192, -66.7921],
  'Salinas': [17.9775, -66.2986],
  'Cayey': [18.1119, -66.1660],
  'Barranquitas': [18.1866, -66.3063],
  'Dorado': [18.4588, -66.2677],
  'Hatillo': [18.4867, -66.8254],
  'Toa Alta': [18.3883, -66.2483],
  'Comerío': [18.2194, -66.2257],
  'Cidra': [18.1760, -66.1613],
  'Manatí': [18.4297, -66.4838],
  'Santa Isabel': [17.9661, -66.4049],
  'Coamo': [18.0799, -66.3578],
  'Aguas Buenas': [18.2572, -66.1025],
  'Carolina': [18.3811, -65.9574],
  'Fajardo': [18.3258, -65.6525],
  'Humacao': [18.1496, -65.8270],
  'Naguabo': [18.2115, -65.7347],
  'Juncos': [18.2275, -65.9211],
  'Río Grande': [18.3802, -65.8313],
  'Luquillo': [18.3726, -65.7166],
  'Canóvanas': [18.3792, -65.9017],
  'Trujillo Alto': [18.3549, -66.0075],
  'Guánica': [17.9713, -66.9081],
  'Yauco': [18.0350, -66.8499],
  'Adjuntas': [18.1627, -66.7224],
  'Villalba': [18.1278, -66.4933],
  'Jayuya': [18.2183, -66.5917],
  'Lares': [18.2956, -66.8784],
  'Las Marías': [18.2511, -66.9903],
  'Maricao': [18.1808, -66.9800],
  'Hormigueros': [18.1399, -67.1273],
  'Lajas': [18.0498, -67.0590],
  'Sabana Grande': [18.0782, -66.9605],
  'Isabela': [18.5005, -67.0244],
  'Aguadilla': [18.4274, -67.1541],
  'Aguada': [18.3792, -67.1874],
  'Rincón': [18.3402, -67.2500],
  'Añasco': [18.2849, -67.1395],
  'Las Piedras': [18.1830, -65.8665],
  'Yabucoa': [18.0505, -65.8793],
  'Maunabo': [18.0072, -65.8993],
  'Patillas': [18.0037, -66.0147],
  'Guayama': [17.9843, -66.1117],
  'Juana Díaz': [18.0523, -66.5066],
  'San Lorenzo': [18.1896, -65.9617],
  'Loíza': [18.4313, -65.8788],
  'Cataño': [18.4414, -66.1174],
  'Naranjito': [18.3005, -66.2448],
  'Morovis': [18.3256, -66.4075],
  'Ciales': [18.3360, -66.4688],
  'Florida': [18.3632, -66.5616],
  'Barceloneta': [18.4517, -66.5388],
  'Camuy': [18.4839, -66.8449],
  'Quebradillas': [18.4734, -66.9388],
};

// ── Map Init ──
const map = L.map('map', {
  zoomControl: false
}).setView([18.22, -66.4], 9);

L.control.zoom({ position: 'topright' }).addTo(map);

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '© OpenStreetMap © CARTO',
  subdomains: 'abcd',
  maxZoom: 19
}).addTo(map);

// ── State ──
let allListings = [];
let markers = [];
let markerLayer = L.layerGroup().addTo(map);

// ── Helpers ──
function getPriceColor(price) {
  if (price < 100000) return '#34d399';
  if (price < 200000) return '#fbbf24';
  if (price < 500000) return '#fb923c';
  return '#f472b6';
}

function getPriceClass(price) {
  if (price < 100000) return 'price-low';
  if (price < 200000) return 'price-mid';
  if (price < 500000) return 'price-high';
  return 'price-premium';
}

function getStatus(item) {
  if (item.is_sold) return 'sold';
  if (item.is_pending) return 'pending';
  return 'live';
}

function formatPrice(amount) {
  return '$' + Number(amount).toLocaleString('en-US', { maximumFractionDigits: 0 });
}

function createMarkerIcon(price) {
  const color = getPriceColor(price);
  return L.divIcon({
    className: 'custom-marker',
    html: `<div style="
      background: ${color};
      color: #000;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      padding: 3px 7px;
      border-radius: 6px;
      white-space: nowrap;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
      border: 2px solid rgba(0,0,0,0.2);
    ">${formatPrice(price)}</div>`,
    iconSize: null,
    iconAnchor: [30, 15]
  });
}

function getCityCoords(city) {
  if (CITY_COORDS[city]) {
    const [lat, lng] = CITY_COORDS[city];
    // Small offset to prevent perfect overlap
    return [lat + (Math.random() - 0.5) * 0.008, lng + (Math.random() - 0.5) * 0.008];
  }
  return null;
}

// ── Parse uploaded JSON ──
function parseListings(raw) {
  const items = [];
  const seen = new Set();

  for (const item of raw) {
    if (item.error) continue;
    if (!item.listing_price) continue;

    const id = item.id;
    if (seen.has(id)) continue;
    seen.add(id);

    const price = parseFloat(item.listing_price.amount);
    const title = (item.marketplace_listing_title || '').trim();

    const city = item.location?.reverse_geocode?.city || 'Unknown';
    const state = item.location?.reverse_geocode?.state || 'PR';
    const coords = getCityCoords(city);

    items.push({
      id,
      title,
      price,
      city,
      state,
      url: item.listingUrl || '',
      is_live: item.is_live || false,
      is_pending: item.is_pending || false,
      is_sold: item.is_sold || false,
      lat: coords ? coords[0] : null,
      lng: coords ? coords[1] : null,
      photo: item.primary_listing_photo?.photo_image_url || null,
    });
  }

  return items.sort((a, b) => a.price - b.price);
}

// ── Render ──
function getActiveStatuses() {
  const pills = document.querySelectorAll('.pill');
  const active = [];
  pills.forEach(p => { if (p.classList.contains('active')) active.push(p.dataset.filter); });
  return active;
}

function getFilteredListings() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const minPrice = parseFloat(document.getElementById('minPrice').value) || 0;
  const maxPrice = parseFloat(document.getElementById('maxPrice').value) || Infinity;
  const city = document.getElementById('cityFilter').value;
  const statuses = getActiveStatuses();

  return allListings.filter(item => {
    if (item.price < minPrice || item.price > maxPrice) return false;
    if (city && item.city !== city) return false;
    if (!statuses.includes(getStatus(item))) return false;
    if (search && !item.title.toLowerCase().includes(search) && !item.city.toLowerCase().includes(search)) return false;
    return true;
  });
}

function renderListings() {
  const filtered = getFilteredListings();
  const container = document.getElementById('listingsContainer');
  const countEl = document.getElementById('listingCount');
  const filteredCountEl = document.getElementById('filteredCount');
  const avgPriceEl = document.getElementById('avgPrice');

  filteredCountEl.textContent = filtered.length;

  if (filtered.length > 0) {
    const avg = filtered.reduce((s, i) => s + i.price, 0) / filtered.length;
    avgPriceEl.textContent = formatPrice(avg);
  } else {
    avgPriceEl.textContent = '—';
  }

  countEl.textContent = `${filtered.length} of ${allListings.length} listings`;

  // Clear markers
  markerLayer.clearLayers();

  if (filtered.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🔍</div>
        <div class="empty-title">No matches</div>
        <div class="empty-sub">Try adjusting your filters.</div>
      </div>`;
    return;
  }

  container.innerHTML = filtered.map(item => {
    const status = getStatus(item);
    return `
      <div class="listing-card" data-id="${item.id}" onclick="focusListing('${item.id}')">
        <div class="card-top">
          <span class="card-price ${getPriceClass(item.price)}">${formatPrice(item.price)}</span>
          <span class="card-status status-${status}">${status}</span>
        </div>
        <div class="card-title">${item.title}</div>
        <div class="card-meta">
          <span class="card-city">📍 ${item.city}, ${item.state}</span>
          <a class="card-link" href="${item.url}" target="_blank" onclick="event.stopPropagation();">Open →</a>
        </div>
      </div>`;
  }).join('');

  // Add markers
  const bounds = [];
  filtered.forEach(item => {
    if (!item.lat || !item.lng) return;

    const marker = L.marker([item.lat, item.lng], {
      icon: createMarkerIcon(item.price)
    });

    marker.bindPopup(`
      <div class="popup-price ${getPriceClass(item.price)}">${formatPrice(item.price)}</div>
      <div class="popup-title">${item.title}</div>
      <div class="popup-city">📍 ${item.city}, ${item.state}</div>
      <a class="popup-link" href="${item.url}" target="_blank">View on Facebook →</a>
    `, { maxWidth: 280 });

    marker.listingId = item.id;
    marker.addTo(markerLayer);
    bounds.push([item.lat, item.lng]);
  });

  if (bounds.length > 0) {
    map.fitBounds(bounds, { padding: [40, 40] });
  }
}

function focusListing(id) {
  const item = allListings.find(i => i.id === id);
  if (!item || !item.lat || !item.lng) return;

  map.setView([item.lat, item.lng], 13, { animate: true });

  // Open popup
  markerLayer.eachLayer(layer => {
    if (layer.listingId === id) {
      layer.openPopup();
    }
  });

  // Highlight card
  document.querySelectorAll('.listing-card').forEach(c => c.classList.remove('highlighted'));
  const card = document.querySelector(`.listing-card[data-id="${id}"]`);
  if (card) card.classList.add('highlighted');
}

function populateCityFilter() {
  const select = document.getElementById('cityFilter');
  const cities = [...new Set(allListings.map(i => i.city))].sort();
  select.innerHTML = '<option value="">All Cities (' + cities.length + ')</option>';
  cities.forEach(city => {
    const count = allListings.filter(i => i.city === city).length;
    select.innerHTML += `<option value="${city}">${city} (${count})</option>`;
  });
}

function loadData(jsonArray) {
  allListings = parseListings(jsonArray);
  document.getElementById('totalCount').textContent = allListings.length;
  populateCityFilter();
  renderListings();
}

// ── Event Listeners ──
document.getElementById('fileInput').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = evt => {
    try {
      const data = JSON.parse(evt.target.result);
      loadData(Array.isArray(data) ? data : [data]);
    } catch (err) {
      alert('Error parsing JSON: ' + err.message);
    }
  };
  reader.readAsText(file);
});

['searchInput', 'minPrice', 'maxPrice', 'cityFilter'].forEach(id => {
  document.getElementById(id).addEventListener('input', renderListings);
});

document.querySelectorAll('.pill').forEach(pill => {
  pill.addEventListener('click', () => {
    pill.classList.toggle('active');
    renderListings();
  });
});

// ── Drag & Drop ──
document.body.addEventListener('dragover', e => {
  e.preventDefault();
  e.stopPropagation();
});

document.body.addEventListener('drop', e => {
  e.preventDefault();
  e.stopPropagation();
  const file = e.dataTransfer.files[0];
  if (!file || !file.name.endsWith('.json')) return;
  const reader = new FileReader();
  reader.onload = evt => {
    try {
      const data = JSON.parse(evt.target.result);
      loadData(Array.isArray(data) ? data : [data]);
    } catch (err) {
      alert('Error parsing JSON: ' + err.message);
    }
  };
  reader.readAsText(file);
});

// ── Auto-load if data.json exists in same directory ──
fetch('data.json')
  .then(r => r.ok ? r.json() : Promise.reject())
  .then(data => loadData(Array.isArray(data) ? data : [data]))
  .catch(() => {});
</script>
